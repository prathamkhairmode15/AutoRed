<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRed | Secure Access Portal</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Apply theme early
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="theme-toggle">
        <button id="theme-toggle-btn" class="theme-toggle-btn">THEME: DARK</button>
    </div>

    <main class="login-page">
        <div class="login-card">
            <div class="card-header">
                <h1 class="card-title flicker">AUTORED&nbsp;<span>APT</span></h1>
                <div class="card-divider"></div>
                <p class="card-subtitle">Secure Access Portal</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input id="email" type="email" class="form-input" placeholder="Enter your email" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" type="password" class="form-input" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>

                <div id="form-status" class="form-status"></div>

                <button type="submit" id="submit-btn" class="btn-submit">
                    ACCESS PORTAL
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from '../js/firebase.js';

        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const statusMsg = document.getElementById('form-status');
        const submitBtn = document.getElementById('submit-btn');
        const themeBtn = document.getElementById('theme-toggle-btn');

        // Theme Toggle Logic
        function updateThemeText(theme) {
            themeBtn.textContent = `THEME: ${theme.toUpperCase()}`;
        }

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeText(newTheme);
        });

        // Initialize theme text
        updateThemeText(document.documentElement.getAttribute('data-theme'));

        // Form Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showStatus('// EMAIL AND PASSWORD REQUIRED', 'error');
                return;
            }

            setLoading(true);
            showStatus('// AUTHENTICATING...', '');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showStatus('// ACCESS GRANTED. REDIRECTING...', 'success');
                setTimeout(() => {
                    window.location.replace('../dashboard/index.html');
                }, 1000);
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                let message = `// ERROR: ${error.code || 'UNKNOWN'}`;
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    message = '// INVALID CREDENTIALS';
                } else if (error.code === 'auth/invalid-email') {
                    message = '// INVALID EMAIL FORMAT';
                } else if (error.code === 'auth/operation-not-allowed') {
                    message = '// EMAIL LOGIN NOT ENABLED IN CONSOLE';
                }
                showStatus(message, 'error');
                setLoading(false);
            }
        });

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'form-status ' + type;
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.textContent = loading ? 'PROCESSING...' : 'ACCESS PORTAL';
        }
    </script>
</body>

</html>
