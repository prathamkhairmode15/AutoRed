<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoRed | Intelligence Reports</title>
    <link rel="stylesheet" href="../dashboard/style.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
  </head>
  <body>
    <div class="app-container">
      <nav class="top-navbar">
        <div class="nav-logo pixel-font">AutoRed <span>APT</span></div>
        <div class="nav-user">
          <button id="theme-toggle" class="theme-toggle">THEME: DARK</button>
          <span id="user-display" class="sub-pixel-font">Authenticating...</span>
          <button class="icon-btn" title="Settings">⚙</button>
          <button id="logout-btn" class="logout-link" title="Logout" style="background:none; border:none; cursor:pointer; font-size: 1.2rem; color: var(--text-secondary);">⏻</button>
        </div>
      </nav>

      <div class="main-wrapper">
        <aside class="sidebar">
          <a href="../dashboard/index.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-icon"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span class="sub-pixel-font">Dashboard</span>
          </a>
          <a href="../new-scan/index.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span class="sub-pixel-font">New Scan</span>
          </a>
          <a href="../scan-history/index.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-icon"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span class="sub-pixel-font">Scan History</span>
          </a>
          <a href="#" class="sidebar-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span class="sub-pixel-font">Reports</span>
          </a>
          <a href="#" class="sidebar-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-icon"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span class="sub-pixel-font">Settings</span>
          </a>
        </aside>

        <main class="content-area">
          <div class="dashboard-header">
            <h2 class="pixel-font" style="font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--accent-color);">
              Target Intelligence Reports
            </h2>
            <p class="sub-pixel-font" style="margin-bottom: 2rem; color: var(--text-secondary)">
              Downloadable aggregated PDF files containing output for completed operations.
            </p>
          </div>

          <section class="activity-section fade-in-up">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Target</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Export Intelligence</th>
                  </tr>
                </thead>
                <tbody id="reports-table-body">
                  <tr><td colspan="4" style="text-align:center; padding: 2rem;">Loading completed scans...</td></tr>
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
